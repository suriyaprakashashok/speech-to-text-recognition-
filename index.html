<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Speech To Text</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(-45deg,#0f172a,#1d4ed8,#06b6d4,#2563eb);background-size:400% 400%;animation:bg 10s infinite}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.card{width:min(90%,700px);background:rgba(255,255,255,.12);backdrop-filter:blur(16px);padding:35px;border-radius:22px;color:#fff;box-shadow:0 20px 50px rgba(0,0,0,.35);text-align:center}
button{padding:14px 24px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin:8px;background:#00c2ff;color:#fff}
button:hover{transform:translateY(-2px)}
textarea{width:100%;height:220px;margin-top:20px;border-radius:12px;padding:15px;border:none;font-size:15px}
.small{opacity:.8;margin-top:15px}
</style>
</head>
<body>
<div class="card">
<h1>🎙️ AI Speech To Text</h1>
<p>Click <b>Start Recording</b>, allow microphone access, and speak.</p>
<div style="margin-top:20px">
<button onclick="startRec()">🎤 Start Recording</button>
<button onclick="stopRec()">⏹ Stop</button>
<button onclick="copyText()">📋 Copy</button>
<button onclick="downloadText()">💾 Download</button>
<button onclick="clearText()">🗑 Clear</button>
</div>
<textarea id="output" placeholder="Your speech will appear here..."></textarea>
<p class="small">Powered by HTML, CSS & JavaScript (Web Speech API)<br>Designed by Suriya Prakash</p>
</div>
<script>
let recognition;
if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window){
 const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
 recognition=new SR();
 recognition.continuous=true;
 recognition.interimResults=true;
 recognition.lang='en-US';
 recognition.onresult=e=>{
   let txt='';
   for(let i=0;i<e.results.length;i++) txt+=e.results[i][0].transcript+" ";
   document.getElementById('output').value=txt;
 };
 recognition.onerror=e=>alert("Error: "+e.error);
}else{
 alert("Your browser doesn't support Web Speech API. Use Google Chrome.");
}
function startRec(){recognition&&recognition.start();}
function stopRec(){recognition&&recognition.stop();}
function copyText(){navigator.clipboard.writeText(output.value);alert("Copied!");}
function clearText(){output.value='';}
function downloadText(){
 const blob=new Blob([output.value],{type:'text/plain'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='transcript.txt';
 a.click();
}
</script>
</body>
</html>
